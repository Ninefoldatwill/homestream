<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4a90d9">
  <title>HomeStream - 离线</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fb;
      color: #1a1a2e;
      padding: 24px;
    }
    .logo {
      width: 96px;
      height: 96px;
      margin-bottom: 24px;
      opacity: 0.8;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 12px;
      font-weight: 600;
    }
    p {
      font-size: 14px;
      color: #666;
      margin: 0 0 24px;
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
    }
    button {
      padding: 12px 32px;
      border: none;
      border-radius: 10px;
      background: #4a90d9;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      min-height: 44px;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.8; }
    .footer {
      position: fixed;
      bottom: 16px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <img class="logo" src="/assets/icon-192.png" alt="HomeStream">
  <h1>HomeStream 离线中</h1>
  <p>当前处于离线状态，请连接网络后刷新，继续使用你的 AI 生态钥匙。</p>
  <button onclick="location.reload()">刷新重连</button>
  <div class="footer">HomeStream V5.0.0 · 铸钥匠</div>
</body>
</html>
