[pytest]
# HomeStream pytest 配置
# 排除 worktrees/ 目录（开发分支残留），避免测试收集干扰
norecursedirs = worktrees .pytest_tmp __pycache__ .git

# asyncio 配置（auto模式自动识别 async def 测试函数）
asyncio_mode = auto

# 过滤已知无害 warnings
filterwarnings =
    # 压力测试函数返回性能指标dict（设计模式，非错误）
    ignore::pytest.PytestReturnNotNoneWarning
    # FastAPI on_event 弃用警告（兼容写法，不影响功能）
    ignore::DeprecationWarning:fastapi
    # Starlette TestClient 弃用警告
    ignore::DeprecationWarning:starlette
