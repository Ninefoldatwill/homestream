<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>HomeStream VoiceBridge 测试</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         max-width: 800px; margin: 40px auto; padding: 20px;
         background: #0a0a0a; color: #e6e6e6; }
  h1 { color: #88c0d0; border-bottom: 1px solid #333; padding-bottom: 12px; }
  .status { padding: 12px; border-radius: 6px; margin: 12px 0;
             background: #1a1a1a; border: 1px solid #333; }
  .connected { background: #1a3a1a; border-color: #4caf50; color: #a5d6a7; }
  button { padding: 10px 20px; font-size: 14px; border-radius: 4px;
            border: 1px solid #555; background: #2a2a2a; color: #e6e6e6;
            cursor: pointer; margin: 4px; }
  .voice-state {
    font-size: 24px;
    text-align: center;
    margin: 16px 0 8px;
    min-height: 36px;
    color: #88c0d0;
    transition: color 0.2s;
  }
  .voice-state.listening { color: #4caf50; }
  .voice-state.thinking { color: #ff9800; }
  .voice-state.speaking { color: #03a9f4; }
  #waveform {
    width: 100%;
    height: 80px;
    border-radius: 8px;
    background: #111;
    border: 1px solid #333;
    display: block;
    margin-bottom: 12px;
  }
  #log { background: #000; color: #88c0d0; padding: 12px;
         border-radius: 4px; height: 300px; overflow-y: auto;
         font-family: 'Consolas', monospace; font-size: 12px;
         border: 1px solid #333; }
  .log-entry { margin: 2px 0; }
  .log-time { color: #666; }
  .log-info { color: #88c0d0; }
  .log-error { color: #f44336; }
  .log-text { color: #a5d6a7; }
</style>
</head>
<body>
  <h1>🔑 HomeStream VoiceBridge 测试</h1>

  <div class="status" id="status">⚪ 未连接</div>

  <div class="voice-state" id="voiceState">🤖 等待连接</div>
  <canvas id="waveform" width="600" height="80"></canvas>

  <div>
    <button id="connectBtn" onclick="connect()">🔌 Connect</button>
    <button id="micBtn" onclick="toggleMic()" disabled>🎤 启用麦克风</button>
    <button id="disconnectBtn" onclick="disconnect()" disabled>❌ Disconnect</button>
  </div>

  <h2>📋 事件日志</h2>
  <div id="log"></div>

<script src="livekit-client.umd.min.js"></script>
<script>
  const LK = window.LivekitClient;
  const URL = 'ws://localhost:7880';
  const TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1lIjoiQnJvd3NlciBVc2VyIiwidmlkZW8iOnsicm9vbUpvaW4iOnRydWUsInJvb20iOiJ2b2ljZS10ZXN0IiwiY2FuUHVibGlzaCI6dHJ1ZSwiY2FuU3Vic2NyaWJlIjp0cnVlLCJjYW5QdWJsaXNoRGF0YSI6dHJ1ZX0sInN1YiI6ImJyb3dzZXItdXNlci0wMDEiLCJpc3MiOiJkZXZrZXkiLCJuYmYiOjE3ODM5NDk0MTgsImV4cCI6MTc4NjU0MTQxOH0.LI8j7F2CiLT1ob8BdKJE6MeqbnQT5AMeZUHJypyZnp4';
  const ROOM = 'voice-test';

  let room = null;
  let micEnabled = false;
  let audioContext = null;
  let analyser = null;
  let micStream = null;
  let animationId = null;
  let currentState = '等待连接';

  function setVoiceState(text, stateClass = '') {
    const el = document.getElementById('voiceState');
    el.textContent = text;
    el.className = 'voice-state ' + stateClass;
    currentState = text;
    log('🎙️ ' + text, 'text');
  }

  function drawWaveform() {
    const canvas = document.getElementById('waveform');
    const ctx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;

    function render() {
      animationId = requestAnimationFrame(render);
      ctx.clearRect(0, 0, width, height);

      let amplitude = 0;
      if (analyser) {
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const sum = data.reduce((a, b) => a + b, 0);
        amplitude = sum / data.length / 255.0; // 0~1
      }

      // 根据状态选择颜色
      let color = '#4caf50';
      if (currentState.includes('思考')) color = '#ff9800';
      else if (currentState.includes('说话') && !currentState.includes('用户')) color = '#03a9f4';
      else if (currentState.includes('聆听') || currentState.includes('用户说话')) color = '#4caf50';
      else color = '#666';

      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      const centerY = height / 2;
      for (let x = 0; x < width; x++) {
        // 合成正弦波 + 实时音量
        const t = Date.now() / 200 + x / 30;
        const base = Math.sin(t) * (height / 6);
        const vol = amplitude * (height / 2.5) * (0.5 + 0.5 * Math.sin(x / 20));
        const y = centerY + base + vol * Math.sin(t * 2 + x / 10);
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    render();
  }

  function log(msg, type = 'info') {
    const el = document.getElementById('log');
    const time = new Date().toLocaleTimeString();
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="log-time">[${time}]</span> ` +
                      `<span class="log-${type}">${msg}</span>`;
    el.appendChild(entry);
    el.scrollTop = el.scrollHeight;
  }

  function setStatus(text, connected = false) {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status' + (connected ? ' connected' : '');
  }

  async function connect() {
    try {
      if (!LK) {
        log('❌ LivekitClient SDK 加载失败 (CDN 不可用?)', 'error');
        return;
      }
      log('正在连接 ' + URL + ' ...', 'info');
      setVoiceState('初始化中...', 'thinking');
      room = new LK.Room({
        adaptiveStream: true,
        dynacast: true,
      });

      room.on(LK.RoomEvent.Connected, () => {
        log('✅ 已连接到房间: ' + ROOM, 'info');
        setStatus('🟢 已连接 (' + ROOM + ')', true);
        document.getElementById('connectBtn').disabled = true;
        document.getElementById('micBtn').disabled = false;
        document.getElementById('disconnectBtn').disabled = false;
        setVoiceState('等待说话');
      });

      room.on(LK.RoomEvent.Disconnected, (reason) => {
        log('❌ 断开连接: ' + reason, 'error');
        setStatus('⚪ 已断开');
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('micBtn').disabled = true;
        document.getElementById('disconnectBtn').disabled = true;
        setVoiceState('未连接');
      });

      room.on(LK.RoomEvent.ParticipantConnected, (participant) => {
        log('🤖 Agent 已加入: ' + participant.identity, 'info');
      });

      room.on(LK.RoomEvent.ParticipantDisconnected, (participant) => {
        log('🤖 Agent 已离开: ' + participant.identity, 'info');
      });

      room.on(LK.RoomEvent.TrackSubscribed, (track, publication, participant) => {
        log('🔊 收到远端音轨: ' + participant.identity, 'info');
        if (track.kind === LK.Track.Kind.Audio) {
          const audioEl = track.attach();
          audioEl.autoplay = true;
          document.body.appendChild(audioEl);
        }
      });

      room.on(LK.RoomEvent.DataReceived, (payload, participant) => {
        const text = new TextDecoder().decode(payload);
        try {
          const data = JSON.parse(text);
          if (data.type === 'voice_state') {
            let cls = '';
            if (data.state.includes('聆听') || data.state.includes('用户说话')) cls = 'listening';
            else if (data.state.includes('思考')) cls = 'thinking';
            else if (data.state.includes('说话') && !data.state.includes('用户')) cls = 'speaking';
            setVoiceState('🤖 ' + data.state, cls);
            return;
          }
        } catch (e) {}
        log('💬 收到 ' + participant.identity + ': ' + text, 'text');
      });

      await room.connect(URL, TOKEN);
      log('连接成功，请求 Agent 加入...', 'info');

      // LiveKit 1.6.5 自托管: 空 agent_name 自动 dispatch 在 reconnect/二次进房等场景不可靠，
      // 通过同域 /dispatch 端点显式触发 Agent 分发
      try {
        const res = await fetch('/dispatch?room=' + encodeURIComponent(ROOM));
        const data = await res.json();
        if (data.ok) {
          log('✅ 已请求 Agent 加入 (' + data.agent + ')', 'info');
        } else {
          log('⚠️ Agent 分发请求失败: ' + (data.error || 'unknown'), 'error');
        }
      } catch (err) {
        log('⚠️ 调用 dispatch 端点失败: ' + err.message, 'error');
      }

      drawWaveform();

    } catch (err) {
      log('连接失败: ' + err.message, 'error');
      console.error(err);
      setVoiceState('连接失败', '');
    }
  }

  async function toggleMic() {
    if (!room) return;
    try {
      if (!micEnabled) {
        log('启用麦克风...', 'info');
        await room.localParticipant.setMicrophoneEnabled(true);
        micEnabled = true;
        document.getElementById('micBtn').textContent = '🎤 关闭麦克风';
        setVoiceState('麦克风已开启，请说话', 'listening');
        // 启动本地音量可视化
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          micStream = stream;
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const source = audioContext.createMediaStreamSource(stream);
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 256;
          source.connect(analyser);
        } catch (e) {
          log('麦克风音量可视化初始化失败: ' + e.message, 'error');
        }
      } else {
        log('关闭麦克风...', 'info');
        await room.localParticipant.setMicrophoneEnabled(false);
        micEnabled = false;
        document.getElementById('micBtn').textContent = '🎤 启用麦克风';
        setVoiceState('等待说话');
        if (micStream) {
          micStream.getTracks().forEach(t => t.stop());
          micStream = null;
        }
        if (audioContext) {
          audioContext.close();
          audioContext = null;
        }
        analyser = null;
      }
    } catch (err) {
      log('麦克风操作失败: ' + err.message, 'error');
    }
  }

  async function disconnect() {
    if (animationId) cancelAnimationFrame(animationId);
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    if (audioContext) audioContext.close();
    if (room) {
      await room.disconnect();
      room = null;
    }
  }

  if (LK) {
    log('页面已加载，LivekitClient SDK 准备就绪。点 Connect 开始。', 'info');
  } else {
    log('⚠️ LivekitClient SDK 加载失败，请检查网络 (CDN: jsdelivr)', 'error');
  }
</script>
</body>
</html>
